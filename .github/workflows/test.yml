name: test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      triton_version:
        description: 'Triton version'
        required: true
        default: '21.08-py3-sdk'

env:
  TARGET: test

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10"]

    steps:
      - name: Checkout
        uses: actions/checkout@v3
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v2
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: python -m pip install ".[dev]"
      - name: Lint and format check
        run: |
          python -m black --check .
          python -m isort --check .
          python -m ruff check .
      - name: 'Create env file'
        run: |
          echo "${{ secrets.environment }}" > .env
      - name: Pull Triton image
        run: |
          docker pull nvcr.io/nvidia/tritonserver:$${{ github.event.inputs.triton_version }}
      - name: Run tests
        uses: isbang/compose-action@v1.5.1
        with:
          compose-file: |
            docker-compose.yml
            docker-compose.test.yml
          up-flags: "--build --abort-on-container-exit --exit-code-from backend"
          down-flags: "--volumes"
